[env]
RUSTC_BOOTSTRAP = "1"
RUST_PANIC_STRATEGY = "abort"
RUST_LIB_BACKTRACE = "0"
RUSTC_LOG = "off"
SCCACHE_IDLE_TIMEOUT = "10800"
SCCACHE_DIRECT = "true"
GITOXIDE_CORE_MULTIPACKINDEX = "true"

[build]
incremental = false
target = "x86_64-unknown-linux-gnu"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v3", "-C", "llvm-args=-enable-dfa-jump-thread"]
